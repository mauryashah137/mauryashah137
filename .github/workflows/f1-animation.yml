name: 🏎 Generate F1 Contribution Track

on:
  schedule:
    # Runs every 12 hours
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run F1 SVG generator
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USER: ${{ github.repository_owner }}
        run: python generate_f1.py

      - name: Commit and push SVGs to output branch
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Switch to (or create) the output branch
          git fetch origin output 2>/dev/null || true
          git checkout -B output

          # Copy generated files to root of output branch
          cp dist/f1-contribution.svg      ./f1-contribution.svg
          cp dist/f1-contribution-dark.svg ./f1-contribution-dark.svg

          git add f1-contribution.svg f1-contribution-dark.svg
          git diff --staged --quiet && echo "No changes." && exit 0

          git commit -m "chore: regenerate F1 contribution track [skip ci]"
          git push origin output --force
